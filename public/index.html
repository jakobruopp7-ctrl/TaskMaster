<!DOCTYPE html>
<!--
  index.html — TaskMaster Frontend Structure
  ------------------------------------------
  This file defines the visible structure of the entire app.
  Think of it as the skeleton: every panel, form, button, and
  list on screen is declared here.

  style.css  controls how everything LOOKS.
  app.js     controls how everything BEHAVES.
-->
<html lang="en">

<head>
  <meta charset="UTF-8">

  <!-- Makes the layout scale correctly on phones and tablets -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>TaskMaster</title>

  <!-- Link to the stylesheet that handles all visual design -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ===================== HEADER ===================== -->
  <!-- Top bar: shows the app name on the left and the
       "+ Add Task" button on the right. The button id is used
       by app.js to attach a click event listener. -->
  <header class="app-header">
    <h1 class="app-title">TaskMaster</h1>
    <button id="openModalBtn" class="btn btn-primary">+ Add Task</button>
  </header>


  <!-- ===================== MAIN LAYOUT ===================== -->
  <!-- Two-column layout: sidebar on the left, task cards on the right.
       Flexbox in style.css handles the side-by-side positioning. -->
  <main class="app-layout">

    <!-- --- SIDEBAR: Category Filter --- -->
    <!-- Clicking a category item triggers a filter in app.js.
         The data-category attribute tells the script which category
         was selected. "active" class highlights the current one. -->
    <aside class="sidebar">
      <h2 class="sidebar-title">Categories</h2>
      <ul id="categoryList" class="category-list">
        <li class="category-item active" data-category="All">All Tasks</li>
        <li class="category-item" data-category="Work">Work</li>
        <li class="category-item" data-category="Personal">Personal</li>
        <li class="category-item" data-category="School">School</li>
        <li class="category-item" data-category="General">General</li>
      </ul>
    </aside>

    <!-- --- TASK LIST AREA --- -->
    <!-- The h2 heading updates when a category is selected.
         The div#taskList is where app.js injects the task cards. -->
    <section class="task-section">
      <h2 id="sectionTitle" class="section-title">All Tasks</h2>

      <div id="taskList" class="task-list">
        <!-- Task cards are generated and inserted here by app.js -->
      </div>
    </section>

  </main>


  <!-- ===================== MODAL (POP-UP FORM) ===================== -->
  <!-- Hidden by default — app.js removes the "hidden" class to show it.
       Clicking the dark background (the modal element itself, not the
       white box) also closes it. -->
  <div id="taskModal" class="modal hidden">
    <div class="modal-content">

      <!-- Title changes between "Add New Task" and "Edit Task" -->
      <h2 id="modalTitle">Add New Task</h2>

      <form id="taskForm">

        <!-- Hidden field: stores the ID of the task being edited.
             Empty when creating a new task. -->
        <input type="hidden" id="taskId">

        <!-- Title is the only required field -->
        <div class="form-group">
          <label for="taskTitle">Title *</label>
          <input type="text" id="taskTitle" placeholder="Enter task title" required>
        </div>

        <!-- Description is optional -->
        <div class="form-group">
          <label for="taskDescription">Description</label>
          <textarea id="taskDescription" rows="3" placeholder="Optional description..."></textarea>
        </div>

        <!-- Category dropdown — options match the sidebar filter -->
        <div class="form-group">
          <label for="taskCategory">Category</label>
          <select id="taskCategory">
            <option value="General">General</option>
            <option value="Work">Work</option>
            <option value="Personal">Personal</option>
            <option value="School">School</option>
          </select>
        </div>

        <!-- Date input — browser renders a native date picker -->
        <div class="form-group">
          <label for="taskDueDate">Due Date</label>
          <input type="date" id="taskDueDate">
        </div>

        <!-- Form buttons: Save submits, Cancel closes the modal -->
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Task</button>
          <button type="button" id="cancelBtn" class="btn btn-secondary">Cancel</button>
        </div>

      </form>
    </div>
  </div>


  <!-- Load app.js last so all HTML elements above are ready when
       the script runs and tries to find them by ID. -->
  <script src="app.js"></script>

</body>
</html>
